<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot</title>

    <style>
        body{
            font-family: Arial;
            background:#f4f4f4;
            text-align:center;
            margin-top:100px;
        }

        .box{
            background:white;
            width:400px;
            margin:auto;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        input{
            width:80%;
            padding:10px;
        }

        button{
            padding:10px 20px;
            background:blue;
            color:white;
            border:none;
        }

        .reply{
            margin-top:20px;
            color:green;
            font-size:20px;
        }
    </style>
</head>

<body>

<div class="box">
    <h1>AI Chatbot</h1>

    <form method="POST">
        <input type="text" name="message" placeholder="Ask something">
        <button type="submit">Send</button>
    </form>

    <div class="reply">
        {{ reply }}
    </div>
</div>

</body>
</html>
